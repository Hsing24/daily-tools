<div class="section-head d:grid grid-cols:minmax(0,0.75fr)|minmax(280px,0.45fr) grid-cols:1fr@<1180 gap:24 ai:end pb:16 bb:2px|solid|var(--primary)">
  <div>
    <p class="section-kicker m:0 color:var(--gold) font-family:var(--font-pixel) f:18 ls:2 lh:1 text-transform:uppercase">{{ kicker() }}</p>
    <h2 [id]="headingId()" class="m:8|0|0 color:var(--ink-bright) font-family:var(--font-pixel) f:36 f:28@<768 f:400 lh:1.1">{{ title() }}</h2>
  </div>
  <p class="section-note m:0 color:var(--ink) f:14">{{ note() }}</p>
</div>
