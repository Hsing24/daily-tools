<div class="type-row d:grid grid-template-columns:220px|minmax(0,1fr)|minmax(220px,0.35fr) grid-template-columns:1fr@<768 gap:16 ai:center p:18|24 bg:var(--canvas-elevated)">
  <div class="type-name color:var(--primary) font-weight:600 f:14">{{ token() }}</div>
  <div class="type-sample" [class]="mappedClass()">{{ sample() }}</div>
  <code class="color:var(--primary-bright) font-family:var(--font-mono)">{{ spec() }}</code>
</div>
