<div>
  <app-tool-breadcrumb category="文字工具" current="字數統計" />

  <app-tool-panel>
    <app-tool-header
      eyebrow="TEXT UTILITIES v1.0.0"
      title="字數統計 (Word Count)"
      description="分析您輸入的文字，依據混合規則提供精準的字元數、字數與行數統計。適合中英混排、含 emoji 的內容統計。"
    />

    @if (alertMessage()) {
    <app-tool-alert [message]="alertMessage()" />
    }

    <!-- Input -->
    <div class="d:block mb:16">
      <label for="word-count-input" class="word-count-label"
        >請輸入、貼上欲統計之文字：</label
      >
      <textarea
        id="word-count-input"
        #textarea
        [value]="text()"
        (input)="onInput(textarea.value)"
        placeholder="請在此輸入或貼上文字，系統將即時進行字數計算..."
        class="word-count-textarea"
      ></textarea>
    </div>

    <!-- Actions -->
    <div class="actions-row">
      <button
        type="button"
        data-testid="btn-paste"
        (click)="paste()"
        class="dt-button dt-button--primary"
      >
        貼上文字
      </button>
      <button
        type="button"
        data-testid="btn-clear"
        (click)="clear()"
        class="dt-button dt-button--warning"
      >
        清除內容
      </button>
    </div>

    <!-- Statistics (Terminal style output) -->
    <app-terminal-output
      title="ANALYZE_REPORT.txt"
      status="[EOF]"
      command="word-count --file=input.txt --verbose"
      footer="PROCESS COMPLETE: 100% (STATUS: SUCCESS)"
      [visible]="!!text()"
    >
      <div class="stats-table">
        <app-stat-row
          label="字元數 (含空白)"
          [value]="stats().charactersWithSpaces"
          testId="stat-chars-with-spaces"
        />
        <app-stat-row
          label="字元數 (不含空白)"
          [value]="stats().charactersNoSpaces"
          testId="stat-chars-no-spaces"
        />
        <app-stat-row
          label="字數 (混合規則)"
          [value]="stats().words"
          testId="stat-words"
          [highlight]="true"
        />
        <app-stat-row
          label="行數"
          [value]="stats().lines"
          testId="stat-lines"
        />
      </div>
    </app-terminal-output>
  </app-tool-panel>
</div>
