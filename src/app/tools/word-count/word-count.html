<div>
  <app-tool-breadcrumb category="文字工具" current="字數統計" />

  <app-tool-panel>
    <app-tool-header
      eyebrow="TEXT UTILITIES v1.0.0"
      title="字數統計 (Word Count)"
      description="分析您輸入的文字，依據混合規則提供精準的字元數、字數與行數統計。適合中英混排、含 emoji 的內容統計。"
    />

    @if (alertMessage()) {
    <app-tool-alert [message]="alertMessage()" />
    }

    <!-- Input -->
    <div class="d:block mb:16">
      <label for="word-count-input" class="d:block mb:8 color:var(--ink-bright) f:14 font-weight:600"
        >請輸入、貼上欲統計之文字：</label
      >
      <textarea
        id="word-count-input"
        #textarea
        [value]="text()"
        (input)="onInput(textarea.value)"
        placeholder="請在此輸入或貼上文字，系統將即時進行字數計算..."
        class="w:100% h:240 p:16 bg:var(--canvas-input) color:var(--ink-bright) font-family:var(--font-mono) f:14 lh:1.6 border:2px|solid|var(--border-muted) box:border-box resize:vertical transition:border-color|0.1s|ease caret-color:var(--primary) caret-shape:block border-color:var(--primary):focus outline:none:focus color:var(--ink-disabled)::placeholder"
      ></textarea>
    </div>

    <!-- Actions -->
    <div class="d:flex gap:16 mb:24 flex:wrap">
      <button
        type="button"
        data-testid="btn-paste"
        (click)="paste()"
        class="dt-button dt-button--primary"
      >
        貼上文字
      </button>
      <button
        type="button"
        data-testid="btn-clear"
        (click)="clear()"
        class="dt-button dt-button--warning"
      >
        清除內容
      </button>
    </div>

    <!-- Statistics (Terminal style output) -->
    <app-terminal-output
      title="ANALYZE_REPORT.txt"
      status="[EOF]"
      command="word-count --file=input.txt --verbose"
      footer="PROCESS COMPLETE: 100% (STATUS: SUCCESS)"
      [visible]="!!text()"
    >
      <div class="d:flex flex:col gap:12">
        <app-stat-row
          label="字元數 (含空白)"
          [value]="stats().charactersWithSpaces"
          testId="stat-chars-with-spaces"
        />
        <app-stat-row
          label="字元數 (不含空白)"
          [value]="stats().charactersNoSpaces"
          testId="stat-chars-no-spaces"
        />
        <app-stat-row
          label="字數 (混合規則)"
          [value]="stats().words"
          testId="stat-words"
          [highlight]="true"
        />
        <app-stat-row
          label="行數"
          [value]="stats().lines"
          testId="stat-lines"
        />
      </div>
    </app-terminal-output>
  </app-tool-panel>
</div>
