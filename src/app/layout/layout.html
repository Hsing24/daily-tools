<a class="skip-link fixed left:8 top:8 z:150 p:10|16 bg:var(--primary) color:var(--on-primary) font-family:var(--font-mono) font-weight:600 ls:1 text-decoration:none translateY(-160%) transition:transform|0.15s|ease translateY(0):focus outline:2px|solid|var(--primary-bright):focus-visible outline-offset:4:focus-visible" href="#main-content">跳至主要內容</a>

<div class="scanline-overlay" aria-hidden="true"></div>

<div class="app-shell d:flex flex:col min-h:100vh w:100% min-w:0 bg:var(--canvas)">
  <header class="prompt-bar fixed top:0 left:0 right:0 z:20 d:flex min-h:40 ai:center jc:space-between gap:16 px:32 px:16@<1024 bg:var(--canvas-deep) bb:2px|solid|var(--primary) color:var(--primary) font-family:var(--font-mono) f:16 f:medium lh:1" role="status" aria-live="polite">
    <div class="prompt-left d:flex ai:center gap:12 min-w:0">
      <a class="prompt-brand d:inline-flex ai:center gap:6 text-decoration:none font-family:var(--font-mono) f:14 font-weight:600 lh:1 outline:1px|solid|var(--primary-bright):focus-visible outline-offset:2:focus-visible" routerLink="/" aria-label="回到首頁">
        <span class="brand-mark-small color:var(--primary) font-family:var(--font-pixel) f:18">&gt;_</span>
        <span class="brand-name-small color:var(--ink-bright) ls:0.5">Daily Tools</span>
      </a>
      <span class="prompt-path min-w:0 overflow:hidden text-overflow:ellipsis white-space:nowrap d:none@<1024">user@daily-tools {{ currentPath() }} $ inspect --theme {{ currentTheme() === 'default' ? 'crt' : 'solarized' }}</span>
    </div>
    <div class="prompt-actions d:flex ai:center gap:8 flex-shrink:0">
      <div class="theme-switcher d:inline-flex w:fit-content border:2px|solid|var(--primary)" role="group" aria-label="語法主題切換">
        <button
          id="theme-btn-monokai"
          class="theme-btn d:inline-flex ai:center jc:center p:4|10 border:0 font-family:var(--font-mono) f:11 font-weight:600 ls:0.5 cursor:pointer transition:background-color|0.05s|ease,color|0.05s|ease br:2px|solid|var(--primary):not(:last-child) outline:1px|solid|var(--primary-bright):focus-visible outline-offset:-2:focus-visible"
          [class]="currentTheme() === 'default' ? 'active bg:var(--primary) color:var(--on-primary)' : 'bg:transparent color:var(--primary) bg:var(--canvas-elevated-2):hover color:var(--primary-bright):hover'"
          type="button"
          [attr.aria-pressed]="currentTheme() === 'default'"
          (click)="setTheme('default')"
        >DARK</button>
        <button
          id="theme-btn-solarized"
          class="theme-btn d:inline-flex ai:center jc:center p:4|10 border:0 font-family:var(--font-mono) f:11 font-weight:600 ls:0.5 cursor:pointer transition:background-color|0.05s|ease,color|0.05s|ease br:2px|solid|var(--primary):not(:last-child) outline:1px|solid|var(--primary-bright):focus-visible outline-offset:-2:focus-visible"
          [class]="currentTheme() === 'solarized' ? 'active bg:var(--primary) color:var(--on-primary)' : 'bg:transparent color:var(--primary) bg:var(--canvas-elevated-2):hover color:var(--primary-bright):hover'"
          type="button"
          [attr.aria-pressed]="currentTheme() === 'solarized'"
          (click)="setTheme('solarized')"
        >LIGHT</button>
      </div>
      <button
        #cmdKBtn
        id="cmd-k-btn"
        class="key-button group border:0 d:inline-flex ai:center min-w:44 h:32 px:10 bg:transparent color:var(--primary) cursor:pointer"
        type="button"
        aria-label="開啟搜尋工具"
        aria-haspopup="dialog"
        (click)="openPalette()"
      >
        <span class="key-chip d:inline-flex ai:center jc:center min-h:24 p:4|8 bg:var(--canvas-elevated-2) border:1px|solid|var(--border-muted) color:var(--ink-bright) font-family:var(--font-mono) f:11 font-weight:600 ls:1 lh:1 color:var(--primary-bright):group-hover border-color:var(--primary-bright):group-hover">/</span>
        <span class="key-text ml:8 f:12 color:var(--ink-muted) font-family:var(--font-mono) transition:color|0.1s|ease color:var(--ink-bright):group-hover d:none@<768">搜尋工具</span>
      </button>
    </div>
  </header>

  <main id="main-content" class="flex:1 w:100% max-w:1200 mx:auto mt:40 p:32|40 px:16@<768 outline:none" tabindex="-1">
    <router-outlet />
  </main>

  <footer class="footer d:flex@<768 flex:col@<768 gap:12@<768 d:grid@>=768 grid-cols:3@>=768 ai:center p:16|32 px:16@<768 bg:var(--canvas-deep) bt:1px|solid|var(--border-muted) color:var(--ink-muted) font-family:var(--font-mono) f:12 ls:0.5">
    <span class="d:inline-flex ai:center gap:8">
      <span class="color:var(--primary) font-weight:600" aria-hidden="true">$</span>
      <span>daily-tools --version alpha</span>
    </span>
    <span class="text:center">theme: DevTool Terminal / scanline 4%</span>
    <a class="color:var(--ink-muted) text-decoration:none color:var(--primary):hover text:right@>=768" href="https://github.com/Hsing24/daily-tools" target="_blank" rel="noopener noreferrer">GitHub</a>
  </footer>
</div>

@if (isPaletteOpen()) {
  <app-command-palette [toolGroups]="toolGroups" (close)="closePalette()" />
}
