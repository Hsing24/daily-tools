<a class="skip-link" href="#main-content">跳至主要內容</a>

<div class="scanline-overlay" aria-hidden="true"></div>

<div class="shell">
  <header class="topbar">
    <button
      #hamburger
      type="button"
      class="hamburger"
      [attr.aria-expanded]="sidebarOpen()"
      aria-controls="tool-sidebar"
      aria-label="切換工具選單"
      (click)="toggleSidebar()"
    >
      <span class="hamburger-bars" aria-hidden="true"></span>
    </button>
    <span class="brand">daily-tools</span>
  </header>

  <div class="body">
    @if (sidebarOpen()) {
      <div class="scrim" (click)="closeSidebar()" aria-hidden="true"></div>
    }

    <aside
      #sidebar
      id="tool-sidebar"
      class="sidebar"
      [class.is-open]="sidebarOpen()"
    >
      <nav class="tool-nav" aria-label="工具清單">
        @for (group of toolGroups; track group.name) {
          <p class="section-label">{{ group.name }}</p>
          <ul class="tool-list">
            @for (tool of group.tools; track tool.label) {
              <li>
                @if (tool.available && tool.route) {
                  <a
                    class="nav-link"
                    [routerLink]="tool.route"
                    routerLinkActive="active"
                    (click)="closeSidebar()"
                  >{{ tool.label }}</a>
                } @else {
                  <span class="nav-disabled">
                    {{ tool.label }}
                    <small>即將推出</small>
                  </span>
                }
              </li>
            }
          </ul>
        }
      </nav>
    </aside>

    <main id="main-content" class="main" tabindex="-1">
      <router-outlet />
    </main>
  </div>
</div>
