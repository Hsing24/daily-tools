<div class="d:flex ai:baseline jc:space-between overflow:hidden opacity:0 max-h:0 animation:fadeInUpRow|0.3s|cubic-bezier(0.25,0.46,0.45,0.94)|both animation:none@media(prefers-reduced-motion:reduce) opacity:1@media(prefers-reduced-motion:reduce) max-h:none@media(prefers-reduced-motion:reduce)" [class.highlight]="highlight()">
  <span class="color:ink white-space:nowrap flex-shrink:0 f:14 color:gold.highlight f:bold.highlight">{{ label() }}</span>
  <span class="flex-grow:1 border-bottom:2px|dotted|border-muted mx:12 pos:relative top:-4" aria-hidden="true"></span>
  <span [attr.data-testid]="testId()" class="font-family:var(--font-pixel) f:28 color:primary lh:1 flex-shrink:0 color:gold.highlight"> {{ value() }} </span>
</div>
