<nav class="d:flex ai:center h:28 mb:24" aria-label="導覽路徑">
  <a [routerLink]="homeLink()" class="d:inline-flex ai:center h:28 pos:relative box:border-box lh:1.2 white-space:nowrap text-decoration:none font-family:var(--font-mono) f:14 font-weight:600 bg:var(--primary) color:var(--on-primary) p:4|18|4|12 clip-path:polygon(0|0,calc(100%|-|14px)|0,100%|50%,calc(100%|-|14px)|100%,0|100%) mr:8 mr:-14@>=768 z:3 bg:var(--primary-bright):hover outline:2px|solid|var(--primary-bright):focus-visible outline-offset:4:focus-visible">
    {{ homeLabel() }}
  </a>
  <span class="d:none@<768 d:inline-flex@>=768 ai:center h:28 pos:relative box:border-box lh:1.2 white-space:nowrap font-family:var(--font-mono) f:14 font-weight:600 bg:var(--gold) color:var(--on-gold) p:4|18 clip-path:polygon(0|0,calc(100%|-|14px)|0,100%|50%,calc(100%|-|14px)|100%,0|100%,0|50%) mr:8 z:2">
    {{ category() }}
  </span>
  <span class="d:inline-flex ai:center h:28 lh:1.2 white-space:nowrap color:var(--primary) font-family:var(--font-mono) f:14 font-weight:600" aria-current="page">
    {{ current() }}
  </span>
</nav>
